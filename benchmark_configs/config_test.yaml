## A test config to run the benchmark

deconv_methods: ["MixUpVI", "Scaden", "TAPE", "NNLS", "DWLS", "OLS", "RLR", "NuSVR", "WNNLS"]
evaluation_datasets: ["CTI"] #, "BULK_FACS"]
granularities: ["1st_level_granularity"] #, "2nd_level_granularity"] #, "FACS_1st_level_granularity"]
evaluation_pseudobulk_samplings: ["DIRICHLET"] # "UNIFORM", "PURIFIED"
n_samples_evaluation_pseudobulk: 300
n_cells_per_evaluation_pseudobulk: [100] #[10, 25, 50, 75, 100, 125, 150, 200, 250, 300, 400, 500, 750, 1000] #, 600, 700, 800, 900, 1000]
signature_matrices: ["CTI_1st_level_granularity"] # "FACS_1st _level_granularity"]
train_dataset: "CTI"
n_variable_genes: 2500
experiment_name: "preprint_experiments_1st_level_10cells" # if None, a random name will be chosen
save: True # if False, only the plots will be saved
use_log_scale: False # Whether to apply log scaling to linear methods